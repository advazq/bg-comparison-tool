<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/global.css" />
    <title>BG Comparison tool</title>
  </head>
  <body>
    <header class="main-header">
      <div>
        <h1><span class="title">BGG Versus</span></h1>
      </div>
      <nav>
        <ul>
          <li><a src="#about">About</a></li>
          <li><a src="#contact">Contacto</a></li>
        </ul>
      </nav>
    </header>
    <main class="layout">
      <div class="container">
        <article class="boardgame-panel bg-1">
          <search class="boardgame-finder">
            <div class="boardgame-placeholder">
              <img src="https://placehold.co/150x150" alt="" />
            </div>
            <input type="text" id="search-bar-1" placeholder="Select a boardgame" />
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="input-chevron"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
            <ul class="bg-list hidden">
              <li>Ark Nova</li>
              <li>Heat</li>
              <li>Ticket To Ride!</li>
            </ul>
          </search>
          <div class="boardgame-card">
            <div class="boardgame-information hidden">
              <h2><span>BG - Title > Hidden</span></h2>
              <p class="information author"><span>Designer:</span></p>
              <p class="information artist"><span>Artist:</span></p>
              <p class="information publisher"><span>Publisher:</span></p>
            </div>
          </div>
        </article>

        <article class="boardgame-panel bg-1">
          <search class="boardgame-finder">
            <div class="boardgame-placeholder">
              <img src="https://placehold.co/150x150" alt="" />
            </div>
            <input type="text" id="search-bar-1" placeholder="Select a boardgame" />
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="input-chevron"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
            <ul class="bg-list hidden">
              <li>Ark Nova</li>
              <li>Heat</li>
              <li>Ticket To Ride!</li>
            </ul>
          </search>
          <div class="boardgame-card">
            <div class="boardgame-information hidden">
              <h2><span>BG - Title > Hidden</span></h2>
              <p class="information author"><span>Designer:</span></p>
              <p class="information artist"><span>Artist:</span></p>
              <p class="information publisher"><span>Publisher:</span></p>
            </div>
          </div>
        </article>
      </div>
    </main>
    <footer></footer>
    <script src="./main.js"></script>
  </body>
</html>
