<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/global.css" />
    <title>BG Comparison tool</title>
  </head>
  <body>
    <header class="main-header">
      <div>
        <h1><span>Boardgame Comparison Tool</span></h1>
      </div>
      <nav>
        <ul>
          <li><a src="#about">About</a></li>
          <li><a src="#contact">Contacto</a></li>
        </ul>
      </nav>
    </header>
    <main class="layout">
      <div class="container">
        <article class="boardgame-1">
          <search class="boardgame-finder">
            <input type="text" id="search-bar-1" placeholder="Select a boardgame" />
            <ul>
              <li>Ark Nova</li>
              <li>Heat</li>
              <li>Ticket To Ride!</li>
            </ul>
          </search>
          <div class="boardgame-card-1">
            <div class="rating-container">
              <div class="rating">Rating</div>
            </div>
            <div class="boardgame-placeholder">
              <img src="" alt="" />
            </div>
            <div class="boardgame-information">
              <h2><span>BG Title</span></h2>
              <p class="information author"><span>Designer:</span></p>
              <p class="information artist"><span>Artist:</span></p>
              <p class="information publisher"><span>Publisher:</span></p>
            </div>
          </div>
        </article>

        <article class="boardgame-selector-2">
          <search class="boardgame-finder">
            <label for="search-bar-2">Boardgame 2</label>
            <input type="text" id="search-bar-2" />
            <ul>
              <li>Ark Nova</li>
              <li>Heat</li>
              <li>Ticket To Ride!</li>
            </ul>
          </search>
          <div class="boardgame-card-2"></div>
        </article>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
